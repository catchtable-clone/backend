name: catchtable-clone

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: catchtable-db
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - catchtable-data:/var/lib/postgresql/data

volumes:
  catchtable-data:
