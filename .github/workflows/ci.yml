name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    services:
      # PostGIS 확장 자동 활성화된 PostgreSQL 16
      # 주의: pgvector 확장은 미포함 — 벡터 의존 테스트는 별도 처리 필요
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Inject application.yaml from secret
        run: |
          mkdir -p src/main/resources
          cat > src/main/resources/application.yaml <<'EOF'
          ${{ secrets.APPLICATION_YAML }}
          EOF

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run tests
        env:
          # services 컨테이너 연결 (application.yaml의 placeholder 변수명에 맞춤)
          DB_HOST: localhost
          DB_PORT: '5432'
          DB_NAME: test
          DB_USER: test
          DB_PASSWORD: test
          # 테스트 격리 — 매번 스키마 새로 생성
          SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop
          # 외부 API는 테스트에서 호출 X — 더미 값으로 부팅만 통과
          GEMINI_API_KEY: dummy_for_ci
          GOOGLE_CLIENT_ID: dummy.apps.googleusercontent.com
          GOOGLE_CLIENT_SECRET: dummy_client_secret
          JWT_SECRET: dummy_jwt_secret_for_ci_at_least_32_characters_long
          FRONTEND_URL: http://localhost:3000
          CORS_ALLOWED_ORIGINS: http://localhost:3000
        run: ./gradlew test

      - name: Build bootJar
        run: ./gradlew bootJar -x test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker build (verify only, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
