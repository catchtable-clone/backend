global:
  scrape_interval: 15s
  external_labels:
    cluster: catchtable
    env: prod

scrape_configs:
  - job_name: 'catchtable-app'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['app:8080']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
