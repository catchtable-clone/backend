global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: catchtable
    env: prod

scrape_configs:
  # Spring Boot Actuator (Micrometer)
  - job_name: 'catchtable-app'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['app:8080']
        labels:
          service: catchtable-backend

  # Prometheus 자체 메트릭
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
