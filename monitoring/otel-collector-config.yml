receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  # OTel Java Agent 2.x는 새 Semantic Conventions(url.path, http.response.status_code) 사용.
  # error_mode: ignore로 attribute 누락 시 안전 처리.
  filter/drop_noise:
    error_mode: ignore
    traces:
      span:
        # HTTP 노이즈: 헬스체크, favicon, API 외 404 (봇 스캔 등)
        - 'IsMatch(attributes["url.path"], "^/actuator.*")'
        - 'IsMatch(attributes["url.path"], "^/favicon.*")'
        - 'attributes["http.response.status_code"] == 404 and not IsMatch(attributes["url.path"], "^/(api|swagger-ui|api-docs).*")'
        # Kafka 백그라운드 프로토콜 trace 차단 (consumer poll/heartbeat/rebalance 등).
        # Producer.send와 @KafkaListener의 실제 메시지 처리 trace는 그대로 보존 — 부하 테스트 분석에 필요.
        - 'name == "Heartbeat" or name == "OffsetCommit" or name == "JoinGroup" or name == "SyncGroup" or name == "FindCoordinator" or name == "Coordinator Discover" or name == "Fetch"'

  batch:
    timeout: 5s
    send_batch_size: 1024

exporters:
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [filter/drop_noise, batch]
      exporters: [otlp/jaeger]
  telemetry:
    logs:
      level: info
