user nginx;
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 10m;

    # Docker 내장 DNS — app 컨테이너 재생성 시 nginx 재시작 없이 새 IP 자동 인식
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ── HTTP (80) ─────────────────────────────────────────
    # Let's Encrypt 인증 + HTTPS 리다이렉트
    server {
        listen 80;
        listen [::]:80;
        server_name api.catcheat.kro.kr;

        # certbot webroot 인증용
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # 그 외 요청은 HTTPS로 리다이렉트
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS (443) ───────────────────────────────────────
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name api.catcheat.kro.kr;

        ssl_certificate /etc/letsencrypt/live/api.catcheat.kro.kr/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.catcheat.kro.kr/privkey.pem;

        # 권장 SSL 설정 (Mozilla intermediate)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:10m;

        # HSTS (HTTPS 강제, 6개월)
        add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;

        # /actuator 경로는 외부 접근 차단
        # Prometheus는 Docker 내부 네트워크에서 app:8080을 직접 호출하므로 영향 없음
        # Docker healthcheck도 컨테이너 내부 호출이라 영향 없음
        location /actuator/ {
            deny all;
            return 403;
        }

        location / {
            # 변수 사용 시 nginx가 매 요청마다 resolver로 DNS 재해석
            set $backend_app "app:8080";
            proxy_pass http://$backend_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_read_timeout 60s;
        }
    }
}
