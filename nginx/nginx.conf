user nginx;
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 10m;

    # ── HTTP (80) ─────────────────────────────────────────
    # Let's Encrypt 인증 + HTTPS 리다이렉트
    server {
        listen 80;
        listen [::]:80;
        server_name api.catcheat.kro.kr;

        # certbot webroot 인증용
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # 그 외 요청은 HTTPS로 리다이렉트
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS (443) ───────────────────────────────────────
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name api.catcheat.kro.kr;

        ssl_certificate /etc/letsencrypt/live/api.catcheat.kro.kr/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.catcheat.kro.kr/privkey.pem;

        # 권장 SSL 설정 (Mozilla intermediate)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:10m;

        # HSTS (HTTPS 강제, 6개월)
        add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;

        location / {
            proxy_pass http://app:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_read_timeout 60s;
        }
    }
}
