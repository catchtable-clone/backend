name: catchtable-clone

services:
  app:
    image: ghcr.io/catchtable-clone/backend:${IMAGE_TAG}
    container_name: catchtable-app
    env_file: .env
    expose:
      - "8080"
    # t3.micro(1GB) 메모리 한계 고려: app은 최대 700MB로 제한
    deploy:
      resources:
        limits:
          memory: 700M
        reservations:
          memory: 500M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - catchtable-net

  nginx:
    image: nginx:1.26.3-alpine
    container_name: catchtable-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - catchtable-net

  certbot:
    image: certbot/certbot:v3.2.0
    container_name: catchtable-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped

networks:
  catchtable-net:
    driver: bridge
